<!DOCTYPE html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<html>

<head>
	<script src="https://d3js.org/d3.v7.min.js"></script>
    <title>Helios-web</title>
    <link href='https://fonts.googleapis.com/css?family=Jura' rel='stylesheet'>

</head>

<style>
	html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
			background:#FFFFFF
        }
	#netviz {
            width: 100%;
            height: 100%;
			background: #f0f0f0;
        }
    .home_button {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
    }
    .home_button:hover {
        scale: 1.1;
    }
   #info-box {
        /* Positioning */
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50; /* Make sure it's on top */
        
        /* Appearance */
        background-color: white;
        padding: 12px 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        font-family: 'Jura', sans-serif;
        text-align: center;
        
        /* State */
        visibility: hidden; 
        transition: visibility 0.2s, opacity 0.2s;
        opacity: 0;
    }
    .tooltip-text {
        font-family: 'Jura';
        font-size: 14px;
        font-weight: bold;
        z-index: 31;
    }
    .tooltip-box {
        fill: white;
        stroke: black;
        stroke-width: 1px;
        z-index: 30;
    }
    .tooltip-outline {
        stroke-linejoin: round;
    }
    .legend-item-hidden {
        opacity: 0.4;
        text-decoration: line-through;
        transition: opacity 0.2s;
    }
    #legend {
        position: absolute;
        font-family: 'Jura';
        bottom: 20px;
        left: 20px;
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        z-index: 20;
    }
    #legend h3 {
        margin: 0 0 10px 0;
        font-family: 'Jura';
        font-size: 16px;
    }
    .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
    }
    .legend-color-box {
        width: 15px;
        height: 15px;
        margin-right: 8px;
        border-radius: 3px;
    }
    #question-button {
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 30px;
        height: 30px;
        background-color: #3e71a8;
        color: rgb(202, 220, 255);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Jura';
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        z-index: 10;
    }
    #question-button:hover {
        background-color: #2e4f7a;
        scale: 1.1;
    }
    #help-box {
        position: absolute;
        bottom: 70px; /* Positioned just above the help button */
        right: 20px;
        width: 250px;
        background-color: rgba(255, 255, 255, 0.8); /* Semi-transparent like legend */
        border-radius: 8px;
        padding: 15px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        font-family: 'Jura', sans-serif;
        z-index: 49;
        
        /* Hidden by default */
        visibility: hidden;
        opacity: 0;
        transition: visibility 0.2s, opacity 0.2s;
    }

    #help-box h3 {
        margin: 0 0 10px 0;
        font-size: 16px;
    }

    #help-box p {
        margin: 0 0 8px 0;
        font-size: 14px;
        line-height: 1.4;
    }

    .show-help {
        visibility: visible !important;
        opacity: 1 !important;
    }
</style>

<body>
    
<div id="info-box"></div>

<div class = "home_button">
    <a href="../index.html">
        <img src = "../images/home1.png" width = 50 height = 50>
    </a>
</div>

<div id="netviz"></div>
<div id="legend">
    <h3>Research Fields</h3>
    <div id="legend-items"></div>
</div>
<div id="question-button">?</div>
<div id="help-box">
    <h3>About this Visualization</h3>
    <p><strong>Hover</strong> over a node to see author details.</p>
    <p><strong>Click</strong> a category in the legend to filter by research field.</p>
    <p><strong>Double-click</strong> a node to zoom in.</p>
</div>
    
<script type = "module" src = "helios.js">
</script>
</body>
</html>
