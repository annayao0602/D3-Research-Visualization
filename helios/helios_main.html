<!DOCTYPE html>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<html>

<head>
	<script src="https://d3js.org/d3.v7.min.js"></script>
    <title>Helios-web</title>
    <link href='https://fonts.googleapis.com/css?family=Jura' rel='stylesheet'>

</head>

<style>
	html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
			background:#FFFFFF
        }
	#netviz {
            width: 100%;
            height: 100%;
			background: #f0f0f0;
        }
    .home_button {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
    }
    .home_button:hover {
        scale: 1.1;
    }
   #info-box {
        /* Positioning */
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 50; /* Make sure it's on top */
        
        /* Appearance */
        background-color: white;
        padding: 12px 20px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        font-family: 'Jura', sans-serif;
        text-align: center;
        
        /* State */
        visibility: hidden; 
        transition: visibility 0.2s, opacity 0.2s;
        opacity: 0;
    }
    .tooltip-text {
        font-family: 'Jura';
        font-size: 14px;
        font-weight: bold;
        z-index: 31;
    }
    .tooltip-box {
        fill: white;
        stroke: black;
        stroke-width: 1px;
        z-index: 30;
    }
    .tooltip-outline {
        stroke-linejoin: round;
    }
    .legend-item-hidden {
        opacity: 0.4;
        text-decoration: line-through;
        transition: opacity 0.2s;
    }
    #legend {
        position: absolute;
        font-family: 'Jura';
        bottom: 20px;
        left: 20px;
        background-color: rgba(255, 255, 255, 0.8);
        border-radius: 8px;
        padding: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        z-index: 20;
    }
    #legend h3 {
        margin: 0 0 10px 0;
        font-family: 'Jura';
        font-size: 16px;
    }
    .legend-item {
        display: flex;
        align-items: center;
        margin-bottom: 5px;
    }
    .legend-color-box {
        width: 15px;
        height: 15px;
        margin-right: 8px;
        border-radius: 3px;
    }
    #question-button {
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: 30px;
        height: 30px;
        background-color: #3e71a8;
        color: rgb(202, 220, 255);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Jura';
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        z-index: 10;
    }
    #question-button:hover {
        background-color: #2e4f7a;
        scale: 1.1;
    }
    /* --- TUTORIAL MODAL STYLES --- */
    #tutorial-modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: rgba(0, 0, 0, 0.3); /* Dark screen overlay */
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: 'Jura', sans-serif;
        opacity: 1;
        transition: opacity 0.7s ease;
    }

    #tutorial-modal.hidden {
        opacity: 0;
        pointer-events: none; 
    }

    #tutorial-card {
        position: relative;
        background: rgba(255, 255, 255, 0.8); 
        backdrop-filter: blur(5px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15); 
        border-radius: 12px;
        padding: 30px;
        width: 400px;
        max-width: 90%;
        text-align: center;
    }
    #tutorial-close {
        position: absolute;
        top: 15px;
        right: 15px;
        background: none;
        border: none;
        font-size: 24px;
        line-height: 1;
        color: #999;
        cursor: pointer;
        transition: color 0.2s;
        padding: 0;
    }

    #tutorial-close:hover {
        color: #333;
    }

    #tutorial-content {
        font-size: 16px;
        line-height: 1.5;
        margin-bottom: 25px;
        min-height: 90px; 
    }

    #tutorial-content h3 {
        margin-top: 0;
        color: #4d76a2;
    }

    #tutorial-next {
        background-color: #3e71a8;
        color: white;
        border: none;
        padding: 10px 24px;
        border-radius: 20px;
        font-family: 'Jura', sans-serif;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        transition: background-color 0.2s, transform 0.1s;
    }

    #tutorial-next:hover {
        background-color: #3b587e;
        transform: scale(1.05);
    }

    .show-help {
        visibility: visible !important;
        opacity: 1 !important;
    }
    #search-container {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 20;
        font-family: 'Jura', sans-serif;
        display: flex;
        align-items: center; 
    }

    #author-search {
        padding: 10px 35px 10px 16px; 
        border-radius: 20px;
        border: 1px solid #ccc;
        width: 250px;
        font-family: 'Jura', sans-serif;
        font-size: 14px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        outline: none;
        background-color: rgba(255, 255, 255, 0.9);
        transition: border-color 0.2s, box-shadow 0.2s;
        box-sizing: border-box; 
    }

    #author-search:focus {
        border-color: #3e71a8;
        box-shadow: 0 2px 8px rgba(62, 113, 168, 0.3);
    }

    #clear-search {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        font-size: 20px;
        line-height: 1;
        cursor: pointer;
        color: #999;
        display: none; 
        padding: 0;
    }

    #clear-search:hover {
        color: #333;
    }
</style>

<body>
    
<div id="info-box"></div>

<div class = "home_button">
    <a href="../index.html">
        <img src = "../images/home1.png" width = 50 height = 50>
    </a>
</div>

<div id="netviz"></div>
<div id="search-container">
    <input type="text" id="author-search" placeholder="Search authors...">
    <button id="clear-search" aria-label="Clear search">&times;</button>
</div>
<div id="legend">
    <h3>Research Fields</h3>
    <div id="legend-items"></div>
</div>
<div id="question-button">?</div>
<div id="tutorial-modal">
    <div id="tutorial-card">
        <button id="tutorial-close" aria-label="Close tutorial">&times;</button>
        <div id="tutorial-content"></div>
        <button id="tutorial-next">Next</button>
    </div>
</div>
    
<script type = "module" src = "helios.js">
</script>
</body>
</html>
